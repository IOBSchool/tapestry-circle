<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | IOB アウトプット月間</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    :root{--green-dark:#2d5a3d;--green-mid:#4a7c59;--green-light:#7aaa8a;--green-pale:#e8f2eb;--beige:#f7f4ef;--cream:#fdfcf9;--gold:#c9a84c;--text-dark:#1a2e22;--text-mid:#4a5e52;--text-light:#8a9e92;--white:#ffffff;--red:#c0392b;--red-pale:#fdf2f2;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--beige);color:var(--text-dark);min-height:100vh;}
    #login-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
    .login-card{background:var(--white);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(45,90,61,.15);text-align:center;}
    .login-card .leaf{font-size:48px;margin-bottom:16px;}
    .login-card h1{font-size:20px;color:var(--green-dark);font-weight:700;}
    .login-card p{font-size:13px;color:var(--text-light);margin-top:8px;}
    .login-card input{width:100%;margin-top:24px;padding:14px 16px;border:1.5px solid #d4e6da;border-radius:10px;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--text-dark);background:var(--cream);}
    .login-card input:focus{outline:none;border-color:var(--green-mid);}
    .login-error{color:var(--red);font-size:13px;margin-top:10px;display:none;}
    .btn-login{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,var(--green-dark),var(--green-mid));color:var(--white);border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
    .btn-login:hover{opacity:.9;}
    #main-screen{display:none;}
    header{background:linear-gradient(135deg,var(--green-dark),var(--green-mid));padding:16px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(45,90,61,.2);}
    .header-left .label{color:var(--green-light);font-size:10px;letter-spacing:2px;text-transform:uppercase;}
    .header-left h1{color:var(--white);font-size:16px;font-weight:700;margin-top:2px;}
    .btn-logout{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.3);padding:6px 16px;border-radius:100px;font-size:12px;cursor:pointer;}
    .tabs{background:var(--white);border-bottom:1px solid #e0ede4;display:flex;overflow-x:auto;}
    .tab-btn{padding:14px 22px;font-size:13px;font-weight:500;color:var(--text-mid);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;}
    .tab-btn:hover{color:var(--green-dark);}
    .tab-btn.active{color:var(--green-dark);border-bottom-color:var(--green-dark);font-weight:700;}
    .tab-content{display:none;max-width:900px;margin:0 auto;padding:28px 20px 80px;}
    .tab-content.active{display:block;}
    .section-title{font-size:15px;font-weight:700;color:var(--green-dark);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .card{background:var(--white);border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(45,90,61,.07);margin-bottom:20px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr;}}
    .form-group{margin-bottom:12px;}
    .form-group label{display:block;font-size:12px;font-weight:500;color:var(--text-mid);margin-bottom:5px;}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;border:1.5px solid #d4e6da;border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text-dark);background:var(--cream);resize:vertical;}
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--green-mid);background:var(--white);}
    .form-group textarea{min-height:80px;}
    .form-full{grid-column:1/-1;}
    .btn{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s;}
    .btn:hover{opacity:.85;}
    .btn-primary{background:var(--green-dark);color:var(--white);}
    .btn-danger{background:var(--red-pale);color:var(--red);border:1px solid #e8b5b5;}
    .btn-secondary{background:var(--green-pale);color:var(--green-dark);}
    .btn-gold{background:var(--gold);color:var(--white);}
    .btn-sm{padding:5px 12px;font-size:12px;}
    .question-item{border:1.5px solid #d4e6da;border-radius:12px;padding:18px 20px;margin-bottom:12px;background:var(--cream);}
    .question-item.current{border-color:var(--gold);background:#fdf9ee;}
    .qi-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
    .qi-badge{background:var(--green-pale);color:var(--green-dark);padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;white-space:nowrap;}
    .qi-badge.current-badge{background:var(--gold);color:var(--white);}
    .qi-question{font-size:14px;color:var(--text-dark);line-height:1.6;flex:1;}
    .qi-meta{font-size:11px;color:var(--text-light);margin-bottom:10px;}
    .qi-actions{display:flex;gap:8px;}
    .filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--white);border-radius:12px;padding:16px 20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(45,90,61,.06);}
    .filter-bar select{padding:8px 12px;border:1.5px solid #d4e6da;border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text-dark);background:var(--cream);min-width:160px;}
    .filter-bar select:focus{outline:none;border-color:var(--green-mid);}
    .resp-table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{background:var(--green-dark);color:var(--white);padding:10px 14px;text-align:left;font-weight:500;white-space:nowrap;}
    td{padding:10px 14px;border-bottom:1px solid var(--green-pale);vertical-align:top;}
    tr:hover td{background:#f5fbf7;}
    .td-answer{max-width:260px;white-space:pre-wrap;word-break:break-word;line-height:1.6;}
    .tag-dept{display:inline-block;background:var(--green-pale);color:var(--green-mid);padding:2px 8px;border-radius:100px;font-size:11px;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
    .stat-card{background:var(--white);border-radius:14px;padding:20px 22px;box-shadow:0 2px 12px rgba(45,90,61,.07);text-align:center;}
    .stat-card .stat-label{font-size:11px;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
    .stat-card .stat-value{font-size:36px;font-weight:700;color:var(--green-dark);line-height:1;}
    .stat-card .stat-sub{font-size:12px;color:var(--text-light);margin-top:4px;}
    .stat-card.gold .stat-value{color:var(--gold);}
    .question-stat{background:var(--white);border-radius:14px;padding:22px 24px;box-shadow:0 2px 12px rgba(45,90,61,.07);margin-bottom:16px;}
    .qs-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .qs-week{background:var(--gold);color:var(--white);padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;}
    .qs-title{font-size:14px;color:var(--text-dark);line-height:1.5;flex:1;}
    .rate-bar-wrap{margin-bottom:16px;}
    .rate-bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-mid);margin-bottom:6px;}
    .rate-bar-track{background:var(--green-pale);border-radius:100px;height:10px;overflow:hidden;}
    .rate-bar-fill{height:100%;background:var(--green-mid);border-radius:100px;transition:width .6s ease;}
    .dept-table{width:100%;border-collapse:collapse;font-size:13px;}
    .dept-table th{background:var(--green-pale);color:var(--green-dark);padding:8px 14px;text-align:left;font-weight:600;}
    .dept-table td{padding:8px 14px;border-bottom:1px solid var(--green-pale);}
    .dept-table tr:last-child td{border-bottom:none;}
    .rate-pill{display:inline-block;padding:2px 10px;border-radius:100px;font-size:11px;font-weight:700;}
    .rate-high{background:#e8f2eb;color:#2d5a3d;}.rate-mid{background:#fef9e7;color:#c9a84c;}.rate-low{background:#fdf2f2;color:#c0392b;}.rate-none{background:#f0f0f0;color:#8a9e92;}
    .settings-section{margin-bottom:28px;}
    .settings-section h3{font-size:14px;font-weight:700;color:var(--green-dark);margin-bottom:14px;}
    .dept-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .dept-row input[type="text"]{flex:1;}
    .dept-row input[type="number"]{width:100px;}
    .empty{text-align:center;padding:40px;color:var(--text-light);font-size:13px;}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--green-dark);color:var(--white);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:all .3s;z-index:1000;}
    .toast.show{transform:translateY(0);opacity:1;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;justify-content:center;align-items:flex-start;padding:40px 20px;overflow-y:auto;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:20px;padding:32px;width:100%;max-width:560px;box-shadow:0 16px 60px rgba(0,0,0,.2);margin:auto;}
    .modal h3{font-size:16px;color:var(--green-dark);font-weight:700;margin-bottom:20px;}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="leaf">🌿</div>
    <h1>アウトプット月間 管理画面</h1>
    <p>IOB スタッフ専用</p>
    <input type="password" id="login-pw" placeholder="管理者パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <p class="login-error" id="login-error">パスワードが違います</p>
    <button class="btn-login" onclick="doLogin()">ログイン</button>
  </div>
</div>

<div id="main-screen">
  <header>
    <div class="header-left">
      <p class="label">IOB — Admin</p>
      <h1>アウトプット月間 管理画面</h1>
    </div>
    <button class="btn-logout" onclick="doLogout()">ログアウト</button>
  </header>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('questions',this)">📋 問い管理</button>
    <button class="tab-btn" onclick="switchTab('responses',this)">💬 回答一覧</button>
    <button class="tab-btn" onclick="switchTab('stats',this)">📊 参加率</button>
    <button class="tab-btn" onclick="switchTab('settings',this)">⚙️ 設定</button>
  </div>

  <!-- 問い管理 -->
  <div id="tab-questions" class="tab-content active">
    <div class="card">
      <p class="section-title">➕ 新しい問いを追加</p>
      <div class="form-grid">
        <div class="form-group"><label>月ラベル（例: 2026年6月）</label><input type="text" id="q-month" placeholder="2026年6月"></div>
        <div class="form-group"><label>週番号（1〜4）</label><select id="q-week"><option value="1">第1週</option><option value="2">第2週</option><option value="3">第3週</option><option value="4">第4週</option></select></div>
        <div class="form-group"><label>開始日</label><input type="date" id="q-start"></div>
        <div class="form-group"><label>終了日</label><input type="date" id="q-end"></div>
        <div class="form-group"><label>テーマ</label><input type="text" id="q-theme" placeholder="オーガニックの基礎"></div>
        <div class="form-group form-full"><label>問い（受講者に見せる質問文）</label><textarea id="q-text" rows="3" placeholder="例: あなたの担当業務と「オーガニック」の接点を…"></textarea></div>
        <div class="form-group form-full"><label>補足説明（任意）</label><input type="text" id="q-desc" placeholder="例: 正解はありません。自由に書いてください。"></div>
      </div>
      <button class="btn btn-primary" onclick="createQuestion()">問いを追加する</button>
    </div>
    <p class="section-title">📅 登録済みの問い</p>
    <div id="questions-list"><div class="empty">読み込み中...</div></div>
  </div>

  <!-- 回答一覧 -->
  <div id="tab-responses" class="tab-content">
    <div class="filter-bar">
      <select id="filter-question" onchange="loadResponses()"><option value="">すべての問い</option></select>
      <select id="filter-dept" onchange="loadResponses()"><option value="">すべての部署</option></select>
      <span id="resp-count" style="font-size:13px;color:var(--text-light);margin-left:auto;"></span>
      <button class="btn btn-gold btn-sm" onclick="exportCsv()">📥 CSV出力</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <div class="resp-table-wrap">
        <table>
          <thead><tr><th>日時</th><th>名前</th><th>部署</th><th>週</th><th>回答</th><th></th></tr></thead>
          <tbody id="resp-tbody"><tr><td colspan="6" class="empty">読み込み中...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 参加率 -->
  <div id="tab-stats" class="tab-content">
    <div id="stats-container"><div class="empty">読み込み中...</div></div>
  </div>

  <!-- 設定 -->
  <div id="tab-settings" class="tab-content">
    <div class="card">
      <div class="settings-section">
        <h3>📩 メールレッスン受講者の総数</h3>
        <div style="display:flex;gap:12px;align-items:center;">
          <input type="number" id="setting-total" placeholder="例: 100" style="width:150px;padding:10px 12px;border:1.5px solid #d4e6da;border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;">
          <span style="font-size:13px;color:var(--text-light);">人</span>
        </div>
        <p style="font-size:12px;color:var(--text-light);margin-top:8px;">参加率の計算に使います</p>
      </div>
      <div class="settings-section">
        <h3>🏢 部署別の受講者数</h3>
        <p style="font-size:12px;color:var(--text-light);margin-bottom:14px;">部署ごとの参加率を計算するために設定します。</p>
        <div id="dept-rows"></div>
        <button class="btn btn-secondary btn-sm" onclick="addDeptRow()" style="margin-top:8px;">＋ 部署を追加</button>
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">設定を保存する</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">詳細</h3>
    <div id="modal-content"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let allQuestions = [], allResponses = [], settings = { totalRecipients: 0, departmentRecipients: {} };
  let isAdmin = false;

  // ===== ログイン =====
  function doLogin() {
    const pw = document.getElementById('login-pw').value;
    if (pw === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      loadQuestions();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }
  function doLogout() {
    isAdmin = false;
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-pw').value = '';
    document.getElementById('login-error').style.display = 'none';
  }

  // ===== タブ =====
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'responses') loadResponses();
    if (tab === 'stats')     loadStats();
    if (tab === 'settings')  loadSettings();
  }

  // ===== 問い管理 =====
  async function loadQuestions() {
    const { data } = await sb.from('output_questions').select('*').order('start_date');
    allQuestions = data || [];
    renderQuestions();
    populateQuestionFilter();
  }

  function renderQuestions() {
    const today = new Date().toISOString().slice(0, 10);
    const el = document.getElementById('questions-list');
    if (!allQuestions.length) { el.innerHTML = '<div class="empty">問いがまだ登録されていません</div>'; return; }
    el.innerHTML = allQuestions.map(q => {
      const isCur = q.start_date <= today && today <= q.end_date;
      return `<div class="question-item ${isCur ? 'current' : ''}">
        <div class="qi-header">
          <span class="qi-badge ${isCur ? 'current-badge' : ''}">${isCur ? '▶ 今週' : '第' + q.week_number + '週'}</span>
          <div>
            <div class="qi-question">${esc(q.question)}</div>
            <div class="qi-meta" style="margin-top:6px;">${esc(q.month_label)} ／ テーマ: ${esc(q.theme||'―')} ／ ${q.start_date} 〜 ${q.end_date}</div>
            ${q.description ? `<div style="font-size:12px;color:var(--text-light);margin-top:2px;">補足: ${esc(q.description)}</div>` : ''}
          </div>
        </div>
        <div class="qi-actions">
          <button class="btn btn-secondary btn-sm" onclick='openEditQ(${JSON.stringify(q)})'>編集</button>
          <button class="btn btn-danger btn-sm" onclick="deleteQ('${q.id}')">削除</button>
        </div>
      </div>`;
    }).join('');
  }

  async function createQuestion() {
    const question = document.getElementById('q-text').value.trim();
    const start    = document.getElementById('q-start').value;
    const end      = document.getElementById('q-end').value;
    if (!question || !start || !end) return toast('問い・開始日・終了日は必須です', true);
    const { error } = await sb.from('output_questions').insert({
      month_label: document.getElementById('q-month').value.trim(),
      week_number: parseInt(document.getElementById('q-week').value),
      start_date:  start, end_date: end,
      theme:       document.getElementById('q-theme').value.trim(),
      question,
      description: document.getElementById('q-desc').value.trim(),
    });
    if (error) return toast('追加に失敗しました', true);
    toast('問いを追加しました');
    ['q-month','q-theme','q-text','q-desc','q-start','q-end'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    await loadQuestions();
  }

  function openEditQ(q) {
    document.getElementById('modal-title').textContent = '✏️ 問いを編集';
    document.getElementById('modal-content').innerHTML = `
      <div class="form-grid">
        <div class="form-group"><label>月ラベル</label><input type="text" id="eq-month" value="${esc(q.month_label||'')}"></div>
        <div class="form-group"><label>週番号</label><input type="number" id="eq-week" value="${q.week_number}" min="1" max="4"></div>
        <div class="form-group"><label>開始日</label><input type="date" id="eq-start" value="${q.start_date}"></div>
        <div class="form-group"><label>終了日</label><input type="date" id="eq-end" value="${q.end_date}"></div>
        <div class="form-group"><label>テーマ</label><input type="text" id="eq-theme" value="${esc(q.theme||'')}"></div>
        <div class="form-group form-full"><label>問い</label><textarea id="eq-text" rows="3">${esc(q.question)}</textarea></div>
        <div class="form-group form-full"><label>補足説明</label><input type="text" id="eq-desc" value="${esc(q.description||'')}"></div>
      </div>`;
    document.getElementById('modal-footer').innerHTML = `
      <button class="btn btn-primary" onclick="saveEditQ('${q.id}')">保存する</button>
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>`;
    document.getElementById('modal').classList.add('open');
  }

  async function saveEditQ(id) {
    const { error } = await sb.from('output_questions').update({
      month_label:  document.getElementById('eq-month').value.trim(),
      week_number:  parseInt(document.getElementById('eq-week').value),
      start_date:   document.getElementById('eq-start').value,
      end_date:     document.getElementById('eq-end').value,
      theme:        document.getElementById('eq-theme').value.trim(),
      question:     document.getElementById('eq-text').value.trim(),
      description:  document.getElementById('eq-desc').value.trim(),
    }).eq('id', id);
    if (error) return toast('更新に失敗しました', true);
    toast('更新しました'); closeModal(); await loadQuestions();
  }

  async function deleteQ(id) {
    if (!confirm('この問いを削除しますか？')) return;
    const { error } = await sb.from('output_questions').delete().eq('id', id);
    if (error) return toast('削除に失敗しました', true);
    toast('削除しました'); await loadQuestions();
  }

  // ===== 回答一覧 =====
  function populateQuestionFilter() {
    const sel = document.getElementById('filter-question');
    const cur = sel.value;
    sel.innerHTML = '<option value="">すべての問い</option>' +
      allQuestions.map(q => `<option value="${q.id}">${esc(q.month_label)} 第${q.week_number}週: ${esc(q.question.slice(0,25))}…</option>`).join('');
    sel.value = cur;
  }

  async function loadResponses() {
    const qid  = document.getElementById('filter-question').value;
    const dept = document.getElementById('filter-dept').value;
    let q = sb.from('output_responses').select('*').order('created_at', { ascending: false });
    if (qid)  q = q.eq('question_id', qid);
    if (dept) q = q.eq('department', dept);
    const { data } = await q;
    allResponses = data || [];

    const depts = [...new Set(allResponses.map(r => r.department))].sort();
    const dSel = document.getElementById('filter-dept');
    const cur = dSel.value;
    dSel.innerHTML = '<option value="">すべての部署</option>' + depts.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
    if (depts.includes(cur)) dSel.value = cur;

    document.getElementById('resp-count').textContent = `${allResponses.length}件`;
    const tbody = document.getElementById('resp-tbody');
    if (!allResponses.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">回答がありません</td></tr>'; return; }
    tbody.innerHTML = allResponses.map(r => `
      <tr>
        <td style="font-size:11px;white-space:nowrap;">${fmtDate(r.created_at)}</td>
        <td style="white-space:nowrap;">${esc(r.name)}</td>
        <td><span class="tag-dept">${esc(r.department)}</span></td>
        <td style="white-space:nowrap;font-size:12px;">第${r.week_number}週</td>
        <td class="td-answer">${esc(r.answer.slice(0,80))}${r.answer.length>80?'…':''}</td>
        <td><button class="btn btn-secondary btn-sm" onclick='openRespDetail(${JSON.stringify(r)})'>詳細</button></td>
      </tr>`).join('');
  }

  function openRespDetail(r) {
    document.getElementById('modal-title').textContent = '💬 回答の詳細';
    document.getElementById('modal-content').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div><p style="font-size:11px;color:var(--text-light);">名前</p><p>${esc(r.name)}</p></div>
        <div><p style="font-size:11px;color:var(--text-light);">部署</p><p>${esc(r.department)}</p></div>
        <div><p style="font-size:11px;color:var(--text-light);">メール</p><p style="font-size:12px;color:var(--text-mid);">${esc(r.email||'―')}</p></div>
        <div><p style="font-size:11px;color:var(--text-light);">日時</p><p style="font-size:12px;color:var(--text-mid);">${fmtDate(r.created_at)}</p></div>
      </div>
      <div style="margin-bottom:14px;">
        <p style="font-size:11px;color:var(--text-light);margin-bottom:6px;">問い（第${r.week_number}週）</p>
        <p style="font-size:13px;color:var(--text-mid);line-height:1.6;padding:12px;background:var(--green-pale);border-radius:8px;">${esc(r.question_text||'')}</p>
      </div>
      <div>
        <p style="font-size:11px;color:var(--text-light);margin-bottom:6px;">回答</p>
        <p style="font-size:14px;line-height:1.8;padding:14px;background:var(--cream);border-radius:8px;border:1px solid #d4e6da;white-space:pre-wrap;">${esc(r.answer)}</p>
      </div>`;
    document.getElementById('modal-footer').innerHTML = `
      <button class="btn btn-danger" onclick="deleteResp('${r.id}')">削除</button>
      <button class="btn btn-secondary" onclick="closeModal()">閉じる</button>`;
    document.getElementById('modal').classList.add('open');
  }

  async function deleteResp(id) {
    if (!confirm('この回答を削除しますか？')) return;
    const { error } = await sb.from('output_responses').delete().eq('id', id);
    if (error) return toast('削除に失敗しました', true);
    toast('削除しました'); closeModal(); await loadResponses();
  }

  async function exportCsv() {
    const { data } = await sb.from('output_responses').select('*').order('created_at', { ascending: false });
    if (!data?.length) return toast('回答データがありません', true);
    const headers = ['回答日時','名前','メール','部署','月','週','テーマ','問い','回答'];
    const rows = data.map(r => [
      fmtDate(r.created_at), r.name, r.email||'', r.department,
      r.month_label||'', r.week_number||'', r.theme||'',
      `"${(r.question_text||'').replace(/"/g,'""')}"`,
      `"${r.answer.replace(/"/g,'""')}"`
    ]);
    const csv = '\uFEFF' + [headers, ...rows].map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
    a.download = `iob-output-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  // ===== 参加率 =====
  async function loadStats() {
    const [{ data: qs }, { data: rs }, { data: st }] = await Promise.all([
      sb.from('output_questions').select('*').order('start_date'),
      sb.from('output_responses').select('*'),
      sb.from('output_settings').select('*').eq('id', 1).maybeSingle(),
    ]);
    const questions = qs || [], responses = rs || [];
    const cfg = st || { total_recipients: 0, department_recipients: {} };
    const deptCfg = cfg.department_recipients || {};
    const total = cfg.total_recipients || 0;
    const totalAns = responses.length;
    const overallRate = total ? Math.round(totalAns / total * 100) : null;

    let html = `<div class="stats-grid">
      <div class="stat-card"><div class="stat-label">総回答数</div><div class="stat-value">${totalAns}</div><div class="stat-sub">件</div></div>
      <div class="stat-card gold"><div class="stat-label">全体参加率</div><div class="stat-value">${overallRate !== null ? overallRate + '%' : '―'}</div><div class="stat-sub">${total ? '受講者 ' + total + '人中' : '設定で受講者数を入力してください'}</div></div>
      <div class="stat-card"><div class="stat-label">登録済みの問い</div><div class="stat-value">${questions.length}</div><div class="stat-sub">問</div></div>
    </div>`;

    html += questions.map(q => {
      const rList = responses.filter(r => r.question_id === q.id);
      const deptMap = {};
      rList.forEach(r => { deptMap[r.department] = (deptMap[r.department] || 0) + 1; });
      const deptRows = Object.entries(deptMap).map(([d, cnt]) => {
        const dt = deptCfg[d] ? parseInt(deptCfg[d]) : 0;
        const dr = dt ? Math.round(cnt / dt * 100) : null;
        const dc = dr === null ? 'rate-none' : dr >= 70 ? 'rate-high' : dr >= 40 ? 'rate-mid' : 'rate-low';
        return `<tr><td>${esc(d)}</td><td>${cnt}件</td><td>${dt ? dt + '人' : '―'}</td><td><span class="rate-pill ${dc}">${dr !== null ? dr + '%' : '―'}</span></td></tr>`;
      }).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text-light);padding:16px;">まだ回答がありません</td></tr>';
      const rate = total ? Math.round(rList.length / total * 100) : null;
      const rc = rate === null ? 'rate-none' : rate >= 70 ? 'rate-high' : rate >= 40 ? 'rate-mid' : 'rate-low';
      return `<div class="question-stat">
        <div class="qs-header"><span class="qs-week">第${q.week_number}週</span><span class="qs-title">${esc(q.question)}</span><span class="rate-pill ${rc}">${rate !== null ? rate + '%' : '―'}</span></div>
        <div class="rate-bar-wrap">
          <div class="rate-bar-label"><span>${rList.length}件回答</span><span>${total ? total + '人中' : '受講者数未設定'}</span></div>
          <div class="rate-bar-track"><div class="rate-bar-fill" style="width:${rate || 0}%"></div></div>
        </div>
        <table class="dept-table"><thead><tr><th>部署</th><th>回答数</th><th>受講者数</th><th>参加率</th></tr></thead><tbody>${deptRows}</tbody></table>
      </div>`;
    }).join('');

    document.getElementById('stats-container').innerHTML = html || '<div class="empty">問いが登録されていません</div>';
  }

  // ===== 設定 =====
  async function loadSettings() {
    const { data } = await sb.from('output_settings').select('*').eq('id', 1).maybeSingle();
    if (!data) return;
    document.getElementById('setting-total').value = data.total_recipients || '';
    const deptContainer = document.getElementById('dept-rows');
    deptContainer.innerHTML = '';
    Object.entries(data.department_recipients || {}).forEach(([d, c]) => addDeptRow(d, c));
  }

  function addDeptRow(dept = '', count = '') {
    const row = document.createElement('div');
    row.className = 'dept-row';
    row.innerHTML = `<input type="text" placeholder="部署名（例: 営業部）" value="${esc(String(dept))}" class="dept-name"><input type="number" placeholder="人数" value="${count}" class="dept-count" min="0"><button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">削除</button>`;
    document.getElementById('dept-rows').appendChild(row);
  }

  async function saveSettings() {
    const total = parseInt(document.getElementById('setting-total').value) || 0;
    const deptMap = {};
    document.querySelectorAll('.dept-row').forEach(row => {
      const n = row.querySelector('.dept-name').value.trim();
      const c = parseInt(row.querySelector('.dept-count').value) || 0;
      if (n) deptMap[n] = c;
    });
    const { error } = await sb.from('output_settings').update({ total_recipients: total, department_recipients: deptMap }).eq('id', 1);
    if (error) return toast('保存に失敗しました', true);
    toast('設定を保存しました');
  }

  // ===== モーダル =====
  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

  // ===== ユーティリティ =====
  let _tt;
  function toast(msg, err = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = err ? 'var(--red)' : 'var(--green-dark)';
    el.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 2800);
  }
  function fmtDate(iso) { const d = new Date(iso); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
